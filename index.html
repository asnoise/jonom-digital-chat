<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jonom Digital Portal</title>
    <style>
        :root { 
            --primary: #004d40; 
            --bg: #ece5dd; 
            --user-msg: #dcf8c6; 
            --bot-msg: #ffffff; 
            --header-dark: #003d33;
        }

        /* Full Screen Setup */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; /* Prevent body from scrolling */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
        }

        .chat-container { 
            width: 100%; 
            height: 100vh; /* Full viewport height */
            display: flex; 
            flex-direction: column; 
            background: var(--bg);
        }

        /* Header Styling matching your image */
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 20px 15px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .logo {
            height: 30px; /* Small logo icon size */
            width: auto;
        }

        .brand-name {
            font-size: 0.9em;
            letter-spacing: 1px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .support-title {
            font-size: 1.2em;
            font-weight: 600;
        }

        /* Chat Area */
        .chat-box { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: var(--bg);
        }

        .msg { 
            padding: 12px 16px; 
            border-radius: 15px; 
            font-size: 15px; 
            max-width: 85%; 
            line-height: 1.4; 
            position: relative; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .bot { 
            background: var(--bot-msg); 
            align-self: flex-start; 
            border-top-left-radius: 2px; 
            color: #333;
        }

        .user { 
            background: var(--user-msg); 
            align-self: flex-end; 
            border-top-right-radius: 2px; 
            color: #000;
        }

        /* UI Elements */
        .menu { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; width: 100%; }
        
        button { 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            background: var(--primary); 
            color: white; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 15px;
            transition: 0.2s; 
            width: 100%;
        }
        
        button:active { transform: scale(0.98); opacity: 0.9; }

        input { 
            padding: 15px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 16px; /* Prevents auto-zoom on iOS */
            outline: none;
        }

        .loading { font-style: italic; color: #777; font-size: 13px; }

        /* Footer */
        .footer { 
            background: #ffffff; 
            color: #888; 
            padding: 12px; 
            text-align: center; 
            font-size: 13px; 
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        /* Hide Scrollbar for clean look */
        .chat-box::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="brand-row">
            <img src="logo.png" alt="Logo" class="logo">
            <div class="brand-name">JONOM DIGITAL</div>
        </div>
        <div class="support-title">Jonom Digital Support</div>
    </div>
    
    <div class="chat-box" id="chat">
        <div class="msg bot">Welcome to Jonom Digital! Are you a new user or an existing user?</div>
        <div class="menu" id="start-menu">
            <button onclick="existingUserFlow()">Existing User</button>
            <button onclick="newUserFlow()">New User</button>
        </div>
    </div>

    <div class="footer">
        © Jonom Digital
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyHpZxy2fndxQRTyZKBwIzqMpVEWnzFXJDlPMyFW6KqM7zRc1mnq-AA_lykX5ppex9P/exec';
    let user = null;

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text;
        const chat = document.getElementById('chat');
        chat.appendChild(div);
        
        // Smooth scroll to bottom
        setTimeout(() => {
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }, 100);
    }

    function existingUserFlow() {
        document.getElementById('start-menu').style.display = 'none';
        addMsg("Existing User", "user");
        addMsg("Please enter your registered email:", "bot");
        
        const inputContainer = document.createElement('div');
        inputContainer.style.padding = "10px 0";
        const input = document.createElement('input');
        input.placeholder = "Enter email and press Enter...";
        input.type = "email";
        input.onkeypress = (e) => { if(e.key === 'Enter') login(input.value) };
        
        inputContainer.appendChild(input);
        document.getElementById('chat').appendChild(inputContainer);
        input.focus();
    }

    async function login(email) {
        if(!email) return;
        addMsg(email, "user");
        addMsg("<span class='loading'>Searching database...</span>", "bot");
        
        try {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkUser", email }) });
            const data = await res.json();

            if(data.success) {
                user = { ...data, email };
                addMsg(`Welcome back, <b>${data.username}</b>! How can we help you today?`, "bot");
                showMainMenu();
            } else {
                addMsg("Email not found. Please try again or register as a New User.", "bot");
                setTimeout(() => location.reload(), 3000);
            }
        } catch (err) {
            addMsg("Connection error. Please check your internet.", "bot");
        }
    }

    function showMainMenu() {
        const menu = document.createElement('div');
        menu.className = "menu";
        menu.innerHTML = `
            <button onclick="checkReleases()">Check Release Status</button>
            <button onclick="submitRelease()">Submit New Release</button>
            <button onclick="showRevenue()">Check Revenue Amount</button>
            <button onclick="contactSupport()">Contact Support Team</button>
        `;
        document.getElementById('chat').appendChild(menu);
    }

    async function checkReleases() {
        addMsg("Checking releases...", "bot");
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkRelease", email: user.email }) });
        const data = await res.json();
        
        if(data.releases && data.releases.length > 0) {
            data.releases.forEach(r => {
                addMsg(`🎵 <b>${r.title}</b><br>✅ Status: ${r.status}<br>🆔 ID: ${r.id}`, "bot");
            });
        } else {
            addMsg("No release records found for this email.", "bot");
        }
    }

    function showRevenue() {
        addMsg(`💰 <b>Your Balance:</b> ₹${user.revenue}<br>🏦 <b>Withdrawal:</b> ${user.withdrawal}`, "bot");
    }

    function submitRelease() {
        addMsg("Click here: <a href='https://shorturl.at/6t1LK' target='_blank' style='color:#004d40; font-weight:bold;'>Submit Release Form</a>. Once done, inform support with your Song Title.", "bot");
    }

    async function contactSupport() {
        const subject = prompt("Enter Subject:");
        const whatsapp = prompt("Enter WhatsApp Number:");
        if(!subject || !whatsapp) return;

        await fetch(API_URL, { method: "POST", body: JSON.stringify({ 
            action: "contactSupport", email: user.email, username: user.username, whatsapp, subject 
        })});
        
        addMsg("Redirecting to WhatsApp...", "bot");
        setTimeout(() => window.location.href = "https://wa.me/918617884711", 1000);
    }

    function newUserFlow() {
        document.getElementById('start-menu').style.display = 'none';
        const u = prompt("Username:");
        const e = prompt("Email:");
        const s = prompt("Stage Name:");
        const w = prompt("WhatsApp:");
        const l = prompt("Record Label:");

        if(u && e) {
            fetch(API_URL, { method: "POST", body: JSON.stringify({ 
                action: "registerUser", username: u, email: e, stageName: s, whatsapp: w, label: l 
            })});
            addMsg("Registration details submitted successfully! We will contact you soon.", "bot");
        }
    }
</script>
</body>
</html>
